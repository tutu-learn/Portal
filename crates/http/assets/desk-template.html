<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <meta name="theme-color" content="#171717">
    <title>Open Frappe Desk</title>
    <link rel="shortcut icon" href="/assets/frappe/images/frappe-favicon.svg" type="image/svg+xml">
    {{CSS_INCLUDES}}
    <style>
        body {
            margin: 0;
            background-color: var(--bg-color, #f4f5f6);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu, Cantarell, "Open Sans", "Helvetica Neue", sans-serif;
        }
        #splash-screen {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f4f5f6;
            z-index: 9999;
            transition: opacity 0.3s ease;
        }
        #splash-screen.hidden {
            opacity: 0;
            pointer-events: none;
        }
        .splash-content {
            text-align: center;
        }
        .splash-logo {
            width: 220px;
            height: 185px;
            margin: 0 auto 24px;
        }
        .splash-logo svg {
            width: 100%;
            height: 100%;
            display: block;
        }
        .splash-text {
            color: #171717;
            font-size: 16px;
            font-weight: 500;
        }
        .splash-sub {
            color: #8c8c8c;
            font-size: 13px;
            margin-top: 4px;
        }
    </style>
</head>
<body>
    <div id="splash-screen">
        <div class="splash-content">
            <div class="splash-logo">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 741 622">
                    <defs>
                        <linearGradient id="blueGrad" x1="5%" y1="0%" x2="95%" y2="95%">
                            <stop offset="0%" stop-color="#013C8F">
                                <animate attributeName="stop-color"
                                    values="#01275C;#013C8F;#2A6FC0;#013C8F;#01275C"
                                    dur="2.4s" repeatCount="indefinite"/>
                            </stop>
                            <stop offset="45%" stop-color="#0F5FAE">
                                <animate attributeName="stop-color"
                                    values="#093F75;#0F5FAE;#4789D0;#0F5FAE;#093F75"
                                    dur="2.4s" repeatCount="indefinite"/>
                            </stop>
                            <stop offset="100%" stop-color="#4B9CD7">
                                <animate attributeName="stop-color"
                                    values="#2F6F9F;#4B9CD7;#8FC4EA;#4B9CD7;#2F6F9F"
                                    dur="2.4s" repeatCount="indefinite"/>
                            </stop>
                        </linearGradient>
                    </defs>
                    <g transform="translate(0,622) scale(0.1,-0.1)" stroke="none">
                        <path fill="#282829" d="M351 4427 c-39 -48 -46 -131 -46 -542 0 -448 9 -542 81 -802 193

-1774 31 -2010 49 -2415 181 -636 209 -973 481 -1192 964 -39 87 -72 182 -137
391 -51 165 -91 217 -130 171z">
                            <animate attributeName="fill"
                                values="#0E0E0F;#282829;#4A4A4C;#282829;#0E0E0F"
                                dur="2.4s" repeatCount="indefinite"/>
                        </path>
                        <path fill="url(#blueGrad)" d="M2915 6049 c-615 -7 -745 -15 -892 -54 -670 -177 -1109 -675 -1130
-1285 -19 -522 248 -942 750 -1180 309 -147 505 -170 1612 -190 1774 -31 2010

                    </g>
                </svg>
            </div>
        </div>
    </div>

    <div class="main-section">
        <header></header>
        <div id="body"></div>
        <footer></footer>
    </div>
    <div id="all-symbols" style="display:none">
{{ICON_SPRITES}}
    </div>
    <div id="build-events-overlay"></div>

    <script>
        window._version_number = "{{BUILD_VERSION}}";
        window.frappe = {};
        window.frappe.boot = {{BOOT_JSON}};
        window.frappe._csrf_token = "{{CSRF_TOKEN}}";
        window.frappe.boot.lang = "{{LANG}}";
        window.frappe.boot.layout_direction = "{{LAYOUT_DIRECTION}}";
    </script>

    {{JS_INCLUDES}}

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            setTimeout(function() {
                var splash = document.getElementById('splash-screen');
                if (splash) splash.classList.add('hidden');
            }, 3000);
        });
    </script>
</body>
</html>
