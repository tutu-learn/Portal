<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <meta name="theme-color" content="#171717">
    <title>Open Frappe Desk</title>
    <link rel="shortcut icon" href="/assets/frappe/images/frappe-favicon.svg" type="image/svg+xml">
    {{CSS_INCLUDES}}
    <style>
        body {
            margin: 0;
            background-color: var(--bg-color, #f4f5f6);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu, Cantarell, "Open Sans", "Helvetica Neue", sans-serif;
        }
        #splash-screen {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f4f5f6;
            z-index: 9999;
            transition: opacity 0.3s ease;
        }
        #splash-screen.hidden {
            opacity: 0;
            pointer-events: none;
        }
        .splash-content {
            text-align: center;
        }
        .splash-text {
            color: #171717;
            font-size: 16px;
            font-weight: 500;
        }
        .splash-sub {
            color: #8c8c8c;
            font-size: 13px;
            margin-top: 4px;
        }
    </style>
</head>
<body>
    <div id="splash-screen">
        <div class="splash-content">
            <div class="splash-text">Open Frappe</div>
            <div class="splash-sub">Loading Desk...</div>
        </div>
    </div>

    <div class="main-section">
        <header></header>
        <div id="body"></div>
        <footer></footer>
    </div>
    <div id="all-symbols" style="display:none"></div>
    <div id="build-events-overlay"></div>

    <script>
        window._version_number = "{{BUILD_VERSION}}";
        window.frappe = {};
        window.frappe.boot = {{BOOT_JSON}};
        window.frappe._csrf_token = "{{CSRF_TOKEN}}";
        window.frappe.boot.lang = "{{LANG}}";
        window.frappe.boot.layout_direction = "{{LAYOUT_DIRECTION}}";
    </script>

    {{JS_INCLUDES}}

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            setTimeout(function() {
                var splash = document.getElementById('splash-screen');
                if (splash) splash.classList.add('hidden');
            }, 3000);
        });
    </script>
</body>
</html>
