<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #f4f5f7;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .login-card {
            background: white;
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            width: 360px;
        }
        .logo {
            text-align: center;
            margin-bottom: 24px;
        }
        .logo img {
            height: 40px;
        }
        h2 {
            text-align: center;
            margin-bottom: 24px;
            font-size: 20px;
            color: #36414c;
        }
        .form-group {
            margin-bottom: 16px;
        }
        label {
            display: block;
            margin-bottom: 6px;
            font-size: 13px;
            color: #8d99a6;
        }
        input {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #d1d8dd;
            border-radius: 4px;
            font-size: 14px;
        }
        input:focus {
            outline: none;
            border-color: #5e64ff;
        }
        button {
            width: 100%;
            padding: 12px;
            background: #5e64ff;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 14px;
            cursor: pointer;
            margin-top: 8px;
        }
        button:hover { background: #4b52e0; }
        .error {
            color: #ff5858;
            font-size: 13px;
            margin-top: 12px;
            text-align: center;
            display: none;
        }
        .social-logins {
            margin-top: 20px;
        }
        .login-divider {
            display: flex;
            align-items: center;
            text-align: center;
            color: #8d99a6;
            font-size: 13px;
            margin: 16px 0;
        }
        .login-divider::before,
        .login-divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid #d1d8dd;
        }
        .login-divider span {
            padding: 0 10px;
        }
        .social-login-buttons {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .btn-social {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            width: 100%;
            padding: 10px 12px;
            background: white;
            color: #36414c;
            border: 1px solid #d1d8dd;
            border-radius: 4px;
            font-size: 14px;
            text-decoration: none;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn-social:hover {
            background: #f4f5f7;
        }
        .social-icon {
            width: 18px;
            height: 18px;
        }
        .btn-office_365 {
            border-color: #0078d4;
            color: #0078d4;
        }
        .btn-office_365:hover {
            background: #f0f6fa;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="logo">
            <img src="/assets/frappe/images/frappe-framework-logo.svg" alt="Frappe">
        </div>
        <h2>Login</h2>
        <form id="login-form">
            <div class="form-group">
                <label>Email or Username</label>
                <input type="text" id="login_email" placeholder="jane@example.com" required autofocus>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="login_password" placeholder="•••••" required>
            </div>
            <button type="submit">Login</button>
            <div class="error" id="error-msg"></div>
        </form>
        {{SOCIAL_LOGINS}}
    </div>
    <script>
        document.getElementById('login-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            const email = document.getElementById('login_email').value;
            const password = document.getElementById('login_password').value;
            const errorMsg = document.getElementById('error-msg');
            errorMsg.style.display = 'none';

            try {
                const res = await fetch('/api/method/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ usr: email, pwd: password }),
                });
                const data = await res.json();
                if (res.ok && data.message === 'Logged In') {
                    window.location.href = '/app';
                } else {
                    errorMsg.textContent = data.error || 'Login failed';
                    errorMsg.style.display = 'block';
                }
            } catch (err) {
                errorMsg.textContent = 'Network error';
                errorMsg.style.display = 'block';
            }
        });
    </script>
</body>
</html>
